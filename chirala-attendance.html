<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chirala Attendance</title>

<link rel="stylesheet" href="chirala.css">

</head>

<body>

<div class="header">

<h2>M.R SOLAR SYSTEMS</h2>
<p>Chirala Branch Attendance</p>

<button onclick="logoutUser()">Logout</button>

</div>


<div class="card">

<p id="empName">Loading...</p>

<p id="gpsStatus">Checking GPS...</p>


<input type="file" id="selfie" accept="image/*" capture="user"><br><br>

<input type="file" id="office" accept="image/*" capture="environment"><br><br>


<button onclick="markAttendance()">Mark Attendance</button>

<p id="msg"></p>

</div>


<div id="verifyPopup" style="display:none">

<h3>Verification Required</h3>

<input type="file" id="verifyPhoto" accept="image/*">

<button onclick="submitVerify()">Submit</button>

</div>


<script type="module" src="./chirala.js"></script>

</body>
</html>
