<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chirala Attendance</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:12px;
box-shadow:0 0 10px black;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}

button:hover{
background:#16a34a;
}

.status{
margin-top:10px;
color:yellow;
}

</style>

</head>

<body>

<h2>M.R Solar Systems</h2>
<h3>Chirala Branch Attendance</h3>

<div class="card">

<p id="empName">Employee</p>

<p id="gpsStatus">GPS Checking...</p>

<input type="file" id="selfie" accept="image/*" capture="user"><br><br>

<input type="file" id="office" accept="image/*" capture="environment"><br><br>

<button onclick="markAttendance()">Mark Attendance</button>

<p class="status" id="msg"></p>

</div>

<script src="chirala.js" type="module"></script>

</body>
</html>
